name: CI - Lint, Tests, and Link Check

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  actions: read

jobs:
  lint:
    name: Lint with Ruff and flake8
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff flake8

      - name: Lint with Ruff (check and fix)
        run: |
          ruff check . --fix
          ruff format .

      - name: Lint with flake8 (SQAaaS requirement)
        run: |
          flake8 --config=.github/linters/.flake8 .

  test:
    name: Run tests with pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev] || pip install .
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest --cov=iriscc --cov-report=xml
          coverage report

  links:
    name: Check Markdown links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          config-file: ".github/linters/mlc_config.json"
          check-modified-files-only: "yes"
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          base-branch: "master"